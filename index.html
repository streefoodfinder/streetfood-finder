<!DOCTYPE html>
<html>
<head>
  <title>StreetFood Finder</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <link rel="stylesheet" href="style.css">

  <style>
    body.dark { background:#0f172a; color:white; }

    .theme-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      cursor: pointer;
      background: white;
      padding: 10px;
      border-radius: 50%;
    }

    .popup {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.5);
      justify-content:center;
      align-items:center;
    }

    .popup-box {
      background:white;
      padding:20px;
      border-radius:10px;
      width:300px;
    }

    #progressBox { display:none; margin-top:10px; }

    #toast {
      position:fixed;
      bottom:20px;
      right:20px;
      background:#111;
      color:white;
      padding:10px;
      border-radius:10px;
      display:none;
    }
  </style>
</head>

<body>

<!-- 🌙 THEME -->
<div class="theme-btn" onclick="toggleTheme()">🌙</div>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>🍜 StreetFood</h2>

    <button onclick="openPopup()">+ Add Stall</button>
    <button>Explore</button>
    <button>Customize</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- SEARCH -->
    <div class="top-bar">
      <input id="searchLocation" placeholder="Enter location">
      <input id="searchFood" placeholder="Search food">
      <button onclick="searchStalls()">Search</button>
    </div>

    <!-- CARDS -->
    <div class="cards" id="cards"></div>

  </div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">

    <h2>Add Stall</h2>

    <input id="stallName" placeholder="Stall Name">
    <input id="stallLocation" placeholder="Location">
    <input id="stallRating" placeholder="Rating (1-5)">
    <input type="file" id="stallImage">

    <!-- PREVIEW -->
    <img id="preview" style="display:none; width:100%; margin-top:10px; border-radius:10px;">

    <!-- PROGRESS -->
    <div id="progressBox">
      <div style="background:#ddd;">
        <div id="progressBar" style="width:0%; height:8px; background:orange;"></div>
      </div>
    </div>

    <br>
    <button onclick="addStall()">Submit</button>
    <button onclick="closePopup()">Close</button>

  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBuT_SZS4Fhc42QDNBBdwFnabzxPJOPWrA",
  authDomain: "streetfood-finder.firebaseapp.com",
  projectId: "streetfood-finder",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


// 🌙 THEME
function toggleTheme() {
  document.body.classList.toggle("dark");
}


// 📌 POPUP
function openPopup() {
  document.getElementById("popup").style.display = "flex";
}
function closePopup() {
  document.getElementById("popup").style.display = "none";
}


// 🖼 IMAGE PREVIEW
document.getElementById("stallImage").addEventListener("change", function() {
  let file = this.files[0];
  let preview = document.getElementById("preview");

  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
});


// 🚀 ADD STALL
function addStall() {
  let name = document.getElementById("stallName").value;
  let location = document.getElementById("stallLocation").value;
  let rating = document.getElementById("stallRating").value;
  let file = document.getElementById("stallImage").files[0];

  if (!name || !location || !rating || !file) {
    showToast("Fill all fields ❗");
    return;
  }

  document.getElementById("progressBox").style.display = "block";

  let formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "new_rd");

  let xhr = new XMLHttpRequest();
  xhr.open("POST", "https://api.cloudinary.com/v1_1/dlptddlij/image/upload");

  xhr.upload.onprogress = function(e) {
    let percent = Math.round((e.loaded / e.total) * 100);
    document.getElementById("progressBar").style.width = percent + "%";
  };

  xhr.onload = function() {
    let data = JSON.parse(xhr.responseText);

    if (data.secure_url) {
      db.collection("stalls").add({
        name,
        location,
        rating,
        image: data.secure_url
      });

      showToast("Uploaded ✅");

      document.getElementById("progressBox").style.display = "none";
      document.getElementById("progressBar").style.width = "0%";

      closePopup();
      loadStalls();
    } else {
      showToast("Upload failed ❌");
    }
  };

  xhr.send(formData);
}


// 📦 LOAD
function loadStalls() {
  let container = document.getElementById("cards");
  container.innerHTML = "";

  db.collection("stalls").get().then(snapshot => {
    snapshot.forEach(doc => {
      let s = doc.data();

      container.innerHTML += `
        <div class="card">
          <img src="${s.image}">
          <h3>${s.name}</h3>
          <p>📍 ${s.location}</p>
          <p>⭐ ${s.rating}</p>
        </div>
      `;
    });
  });
}


// 🔍 SEARCH
function searchStalls() {
  let loc = document.getElementById("searchLocation").value.toLowerCase();
  let food = document.getElementById("searchFood").value.toLowerCase();

  let container = document.getElementById("cards");
  container.innerHTML = "";

  db.collection("stalls").get().then(snapshot => {
    snapshot.forEach(doc => {
      let s = doc.data();

      if (
        s.location.toLowerCase().includes(loc) &&
        s.name.toLowerCase().includes(food)
      ) {
        container.innerHTML += `
          <div class="card">
            <img src="${s.image}">
            <h3>${s.name}</h3>
            <p>📍 ${s.location}</p>
            <p>⭐ ${s.rating}</p>
          </div>
        `;
      }
    });
  });
}


// 🔔 TOAST
function showToast(msg) {
  let toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.style.display = "block";

  setTimeout(() => {
    toast.style.display = "none";
  }, 2000);
}


// START
loadStalls();

</script>

<body>

<!-- 🌙 THEME -->
<div class="theme-btn" onclick="toggleTheme()">🌙</div>

<!-- ☰ MENU BUTTON -->
<div class="menu-btn" onclick="toggleSidebar()">☰</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <h2>🍜 SFF</h2>
  <button onclick="openPopup()">➕ Add Stall</button>
  <button>🔍 Explore</button>
  <button>🎨 Customize</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- PREMIUM SEARCH -->
  <div class="search-box">
    <input id="searchLocation" placeholder="📍 Location">
    <input id="searchFood" placeholder="🍔 What do you want?">
    <button onclick="searchStalls()">Search</button>
  </div>

  <!-- CARDS -->
  <div class="cards" id="cards"></div>

</div>

<!-- POPUP (KEEP SAME) -->
<div id="popup" class="popup">
  <div class="popup-box">

    <h2>Add Stall</h2>

    <input id="stallName" placeholder="Stall Name">
    <input id="stallLocation" placeholder="Location">
    <input id="stallRating" placeholder="Rating (1-5)">
    <input type="file" id="stallImage">

    <img id="preview" style="display:none; width:100%; margin-top:10px; border-radius:10px;">

    <div id="progressBox">
      <div style="background:#ddd;">
        <div id="progressBar" style="width:0%; height:8px; background:orange;"></div>
      </div>
    </div>

    <br>
    <button onclick="addStall()">Submit</button>
    <button onclick="closePopup()">Close</button>

  </div>
</div>

<div id="toast"></div>
<div class="menu-btn" onclick="toggleSidebar()">☰</div>

</body>
</html>
