<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StreetFood Finder</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>🍜 StreetFood Finder</h2>

    <button onclick="openPopup()">➕ Add Stall</button>
  </div>

  <!-- Main Content -->
  <div class="main">
    <div class="top-bar">
      <input placeholder="Find a City or Area..." />
      <button>Search</button>
    </div>

    <div class="cards"></div>
  </div>

</div>

<!-- 🔥 PREMIUM POPUP -->
<div id="popupForm" class="popup">
  <div class="popup-card">

    <h2>Add New Stall 🍜</h2>

    <div class="input-group">
      <label>Stall Name</label>
      <input id="stallName" placeholder="e.g. Sandeep Egg Roll">
    </div>

    <div class="input-group">
      <label>Location</label>
      <input id="stallLocation" placeholder="e.g. Patna">
    </div>

    <div class="input-group">
      <label>Image URL</label>
      <input id="stallImage" placeholder="Paste image link">
    </div>

    <div class="input-group">
      <label>Rating</label>
      <input id="stallRating" placeholder="1 - 5">
    </div>

    <div class="popup-buttons">
      <button class="add-btn" onclick="addStall()">Add Stall</button>
      <button class="close-btn" onclick="closePopup()">Cancel</button>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
