<!DOCTYPE html>
<html>
<head>
  <title>StreetFood Finder</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
/* GLOBAL */
body {
  margin:0;
  font-family:'Segoe UI';
  background:#f3f4f6;
}

/* DARK MODE */
body.dark {
  background:#0f172a;
  color:white;
}

/* MENU BUTTON */
.menu-btn {
  position:fixed;
  top:20px;
  left:20px;
  font-size:22px;
  cursor:pointer;
  z-index:1000;
}

/* SIDEBAR */
.sidebar {
  position:fixed;
  left:-230px;
  top:0;
  width:220px;
  height:100%;
  background:#111;
  color:white;
  padding:20px;
  transition:0.3s;
}

.sidebar.active { left:0; }

.sidebar button {
  width:100%;
  margin:10px 0;
  padding:10px;
  border:none;
  background:#222;
  color:white;
  border-radius:8px;
}

/* MAIN */
.main { padding:70px 20px; }

/* SEARCH */
.top-bar {
  display:flex;
  gap:10px;
  background:white;
  padding:10px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.top-bar input {
  flex:1;
  padding:10px;
  border:none;
  outline:none;
}

.top-bar button {
  background:#ff7a18;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:10px;
}

/* CARDS */
.cards {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
  margin-top:20px;
}

/* CARD */
.card {
  background:linear-gradient(135deg,#ffffff,#f1f5f9);
  border-radius:15px;
  padding:10px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  transition:0.3s;
}

body.dark .card {
  background:#1e293b;
}

.card:hover {
  transform:translateY(-5px);
}

.card img {
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.card h3 {
  margin:10px 0 5px;
}

.card p {
  margin:3px 0;
}

/* POPUP */
.popup {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.popup-box {
  background:white;
  padding:20px;
  border-radius:15px;
  width:300px;
}

/* STAR RATING */
.stars span {
  font-size:22px;
  cursor:pointer;
}

/* TOAST */
#toast {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#111;
  color:white;
  padding:10px;
  border-radius:10px;
  display:none;
}
  </style>
</head>

<body>

<div class="menu-btn" onclick="toggleSidebar()">☰</div>

<div id="sidebar" class="sidebar">
  <h2>🍜 SFF</h2>
  <button onclick="openPopup()">Add Stall</button>
  <button>Explore</button>
</div>

<div class="main">

  <div class="top-bar">
    <input id="searchLocation" placeholder="📍 Location">
    <input id="searchFood" placeholder="🍔 Food">
    <button onclick="searchStalls()">Search</button>
  </div>

  <div id="cards" class="cards"></div>

</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">

    <h2>Add Stall</h2>

    <input id="stallName" placeholder="Food Name"><br><br>
    <input id="stallLocation" placeholder="Location"><br><br>

    <!-- ⭐ STAR RATING -->
    <div class="stars" id="stars">
      <span onclick="setRating(1)">⭐</span>
      <span onclick="setRating(2)">⭐</span>
      <span onclick="setRating(3)">⭐</span>
      <span onclick="setRating(4)">⭐</span>
      <span onclick="setRating(5)">⭐</span>
    </div>

    <!-- COMMENT -->
    <input id="stallComment" placeholder="Write comment"><br><br>

    <input type="file" id="stallImage"><br><br>

    <button onclick="addStall()">Submit</button>
    <button onclick="closePopup()">Close</button>

  </div>
</div>

<div id="toast"></div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBuT_SZS4Fhc42QDNBBdwFnabzxPJOPWrA",
  authDomain: "streetfood-finder.firebaseapp.com",
  projectId: "streetfood-finder",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// SIDEBAR
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("active");
}

// POPUP
function openPopup(){ document.getElementById("popup").style.display="flex"; }
function closePopup(){ document.getElementById("popup").style.display="none"; }

// ⭐ RATING
let selectedRating = 0;
function setRating(r){
  selectedRating = r;
}

// ADD STALL
function addStall(){
  let name = stallName.value;
  let location = stallLocation.value;
  let comment = stallComment.value;
  let file = stallImage.files[0];

  if(!name || !location || !file || selectedRating==0){
    showToast("Fill all fields");
    return;
  }

  let formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "new_rd");

  fetch("https://api.cloudinary.com/v1_1/dlptddlij/image/upload",{
    method:"POST",
    body:formData
  })
  .then(res=>res.json())
  .then(data=>{
    db.collection("stalls").add({
      name,
      location,
      rating:selectedRating,
      comment,
      image:data.secure_url
    });

    showToast("Uploaded ✅");
    closePopup();
    loadStalls();
  });
}

// LOAD
function loadStalls(){
  cards.innerHTML="";
  db.collection("stalls").get().then(snap=>{
    snap.forEach(doc=>{
      let s=doc.data();

      cards.innerHTML+=`
      <div class="card">
        <img src="${s.image}">
        <h3>${s.name}</h3>
        <p>📍 ${s.location}</p>
        <p>⭐ ${s.rating}</p>
        <p>💬 ${s.comment || ""}</p>
      </div>`;
    });
  });
}

// SEARCH
function searchStalls(){
  let loc=searchLocation.value.toLowerCase();
  let food=searchFood.value.toLowerCase();

  cards.innerHTML="";
  db.collection("stalls").get().then(snap=>{
    snap.forEach(doc=>{
      let s=doc.data();

      if(s.location.toLowerCase().includes(loc) &&
         s.name.toLowerCase().includes(food)){
        cards.innerHTML+=`
        <div class="card">
          <img src="${s.image}">
          <h3>${s.name}</h3>
          <p>📍 ${s.location}</p>
          <p>⭐ ${s.rating}</p>
          <p>💬 ${s.comment || ""}</p>
        </div>`;
      }
    });
  });
}

// TOAST
function showToast(msg){
  toast.innerText=msg;
  toast.style.display="block";
  setTimeout(()=>toast.style.display="none",2000);
}

// START
loadStalls();

</script>

</body>
</html>
