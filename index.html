<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StreetFood Finder</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>🍜 StreetFood Finder</h2>

    <button onclick="openPopup()">➕ Add Stall</button>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="cards"></div>
  </div>

</div>

<!-- Popup -->
<div id="popupForm" class="popup">
  <div class="popup-content">
    <h3>Add Stall</h3>

    <input id="stallName" placeholder="Name">
    <input id="stallLocation" placeholder="Location">
    <input id="stallImage" placeholder="Image URL">
    <input id="stallRating" placeholder="Rating">

    <button onclick="addStall()">Add</button>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
