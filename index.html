<!DOCTYPE html>
<html>
<head>
  <title>StreetFood Finder</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <link rel="stylesheet" href="style.css">

  <style>
    /* DARK MODE */
    body.dark {
      background: #0f172a;
      color: white;
    }

    body.dark .card {
      background: #1e293b;
      color: white;
    }

    body.dark input {
      background: #1e293b;
      color: white;
    }

    body.dark .popup-box {
      background: #1e293b;
    }

    /* THEME BUTTON */
    .theme-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 20px;
      cursor: pointer;
      background: white;
      padding: 10px;
      border-radius: 50%;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    }

    body.dark .theme-btn {
      background: #1e293b;
      color: white;
    }
  </style>
</head>

<body>

<!-- 🌙 THEME BUTTON -->
<div class="theme-btn" onclick="toggleTheme()">🌙</div>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>🍜 StreetFood</h2>

    <button onclick="openPopup()">+ Add Stall</button>
    <button>Explore</button>
    <button>Customize</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- SEARCH -->
    <div class="top-bar">
      <input id="searchLocation" placeholder="Enter location">
      <input id="searchFood" placeholder="Search food">
      <button onclick="searchStalls()">Search</button>
    </div>

    <!-- CARDS -->
    <div class="cards" id="cards"></div>

  </div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">
    <h2>Add Stall</h2>

    <input id="stallName" placeholder="Stall Name">
    <input id="stallLocation" placeholder="Location">
    <input id="stallRating" placeholder="Rating (1-5)">
    <input type="file" id="stallImage">

    <button onclick="addStall()">Submit</button>
    <button onclick="closePopup()">Close</button>
  </div>
</div> 
<div id="loader" class="loader">
  <p>Uploading... <span id="progress">0%</span></p>
</div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBuT_SZS4Fhc42QDNBBdwFnabzxPJOPWrA",
  authDomain: "streetfood-finder.firebaseapp.com",
  projectId: "streetfood-finder",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


// 🌙 THEME TOGGLE
function toggleTheme() {
  document.body.classList.toggle("dark");
}


// 📌 POPUP
function openPopup() {
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}


// 🚀 ADD STALL (FIXED CLOUDINARY)
function addStall() {
  let name = document.getElementById("stallName").value;
  let location = document.getElementById("stallLocation").value;
  let rating = document.getElementById("stallRating").value;
  let file = document.getElementById("stallImage").files[0];

  if (!name || !location || !rating || !file) {
    alert("Fill all fields!");
    return;
  }

  let formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "new_rd");

  fetch("https://api.cloudinary.com/v1_1/dlptddlij/image/upload", {
    method: "POST",
    body: formData
  })
  .then(res => res.json())
  .then(data => {

    console.log(data);

    if (data.secure_url) {
      db.collection("stalls").add({
        name,
        location,
        rating,
        image: data.secure_url
      });

      alert("Upload successful ✅");
      closePopup();
      loadStalls();
    } else {
      alert("Upload failed ❌");
    }

  })
  .catch(err => {
    console.error(err);
    alert("Error uploading ❌");
  });
}


// 📦 LOAD
function loadStalls() {
  let container = document.getElementById("cards");
  container.innerHTML = "";

  db.collection("stalls").get().then(snapshot => {
    snapshot.forEach(doc => {
      let s = doc.data();

      container.innerHTML += `
        <div class="card">
          <img src="${s.image}">
          <h3>${s.name}</h3>
          <p>📍 ${s.location}</p>
          <p>⭐ ${s.rating}</p>
        </div>
      `;
    });
  });
}


// 🔍 SEARCH
function searchStalls() {
  let loc = document.getElementById("searchLocation").value.toLowerCase();
  let food = document.getElementById("searchFood").value.toLowerCase();

  let container = document.getElementById("cards");
  container.innerHTML = "";

  db.collection("stalls").get().then(snapshot => {
    snapshot.forEach(doc => {
      let s = doc.data();

      if (
        s.location.toLowerCase().includes(loc) &&
        s.name.toLowerCase().includes(food)
      ) {
        container.innerHTML += `
          <div class="card">
            <img src="${s.image}">
            <h3>${s.name}</h3>
            <p>📍 ${s.location}</p>
            <p>⭐ ${s.rating}</p>
          </div>
        `;
      }
    });
  });
}


// 🔄 LOAD ON START
loadStalls();

</script>

</body>
</html>
