<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreetFood Finder</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="menu-btn" onclick="toggleSidebar()">☰</div>
  <h1>🍜 Street🌍Food 🍔</h1>
  <div class="theme-btn" onclick="toggleTheme()">🌙</div>
</header>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <h2>🍜 SFF</h2>
  <button onclick="openPopup()">➕ Add Stall</button>
  <button>Explore</button>
  <button onclick="toggleTheme()">🌗 Toggle Mode</button>
  <button onclick="alert('Contact: your@email.com')">📩 Contact Me</button>
</div>

<!-- MAIN -->
<div class="main">

  <div class="top-bar">
    <input id="searchLocation" placeholder="📍 Location">
    <input id="searchFood" placeholder="🍔 Food">
    <button onclick="searchStalls()">Search</button>
  </div>

  <div id="cards" class="cards"></div>

</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">

    <h2>Add Stall</h2>

    <input id="stallName" placeholder="Food Name">
    <input id="stallLocation" placeholder="Location">

    <!-- ⭐ STAR SYSTEM -->
    <div class="stars">
      <span onclick="setRating(1)">☆</span>
      <span onclick="setRating(2)">☆</span>
      <span onclick="setRating(3)">☆</span>
      <span onclick="setRating(4)">☆</span>
      <span onclick="setRating(5)">☆</span>
    </div>

    <input id="stallComment" placeholder="Comment">
    <input type="file" id="stallImage">

    <button onclick="addStall()">Submit</button>
    <button onclick="closePopup()">Close</button>

  </div>
</div>

<!-- 🎬 SUCCESS SCREEN -->
<div id="successScreen" class="success-screen">
  <div class="food-animation">
    🍕 🍔 🌮 🍣 🍜 🥟 🍟 🍩 🍗 🌯
  </div>
  <h2>Upload Successful 🚀</h2>
</div>

<script src="script.js"></script>
</body>
</html>
