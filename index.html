<!DOCTYPE html>
<html>
<head>
  <title>StreetFood Finder</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <link rel="stylesheet" href="style.css">

  <style>
    body.dark { background:#0f172a; color:white; }
    body.dark .card { background:#1e293b; color:white; }

    .theme-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      cursor: pointer;
      background: white;
      padding: 10px;
      border-radius: 50%;
    }

    .popup {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.5);
      justify-content:center;
      align-items:center;
    }

    .popup-box {
      background:white;
      padding:20px;
      border-radius:10px;
      width:300px;
    }

    .card {
      background:white;
      padding:10px;
      border-radius:10px;
      width:200px;
      margin:10px;
      display:inline-block;
    }

    img { width:100%; border-radius:10px; }

    #progressBox {
      display:none;
      margin-top:10px;
    }

    #toast {
      position:fixed;
      bottom:20px;
      right:20px;
      background:#111;
      color:white;
      padding:10px 15px;
      border-radius:10px;
      display:none;
    }
  </style>
</head>

<body>

<div class="theme-btn" onclick="toggleTheme()">🌙</div>

<h1>🍜 StreetFood Finder</h1>

<button onclick="openPopup()">+ Add Stall</button>

<input id="searchLocation" placeholder="Location">
<input id="searchFood" placeholder="Food">
<button onclick="searchStalls()">Search</button>

<div id="cards"></div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">

    <h2>Add Stall</h2>

    <input id="stallName" placeholder="Name"><br><br>
    <input id="stallLocation" placeholder="Location"><br><br>
    <input id="stallRating" placeholder="Rating"><br><br>
    <input type="file" id="stallImage"><br>

    <!-- IMAGE PREVIEW -->
    <img id="preview" style="display:none; margin-top:10px;">

    <!-- PROGRESS -->
    <div id="progressBox">
      <div style="background:#ddd;">
        <div id="progressBar" style="width:0%; height:8px; background:orange;"></div>
      </div>
    </div>

    <br>
    <button onclick="addStall()">Submit</button>
    <button onclick="closePopup()">Close</button>

  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBuT_SZS4Fhc42QDNBBdwFnabzxPJOPWrA",
  authDomain: "streetfood-finder.firebaseapp.com",
  projectId: "streetfood-finder",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


// 🌙 THEME
function toggleTheme() {
  document.body.classList.toggle("dark");
}


// 📌 POPUP
function openPopup() {
  document.getElementById("popup").style.display = "flex";
}
function closePopup() {
  document.getElementById("popup").style.display = "none";
}


// 🖼 IMAGE PREVIEW
document.getElementById("stallImage").addEventListener("change", function() {
  let file = this.files[0];
  let preview = document.getElementById("preview");

  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
});


// 🚀 ADD STALL (FINAL FIXED)
function addStall() {

  let name = document.getElementById("stallName").value;
  let location = document.getElementById("stallLocation").value;
  let rating = document.getElementById("stallRating").value;
  let file = document.getElementById("stallImage").files[0];

  if (!name || !location || !rating || !file) {
    showToast("Fill all fields ❗");
    return;
  }

  document.getElementById("progressBox").style.display = "block";

  let formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "new_rd");

  let xhr = new XMLHttpRequest();
  xhr.open("POST", "https://api.cloudinary.com/v1_1/dlptddlij/image/upload");

  xhr.upload.onprogress = function(e) {
    let percent = Math.round((e.loaded / e.total) * 100);
    document.getElementById("progressBar").style.width = percent + "%";
  };

  xhr.onload = function() {
    let data = JSON.parse(xhr.responseText);

    if (data.secure_url) {

      db.collection("stalls").add({
        name,
        location,
        rating,
        image: data.secure_url
      });

      showToast("Uploaded ✅");

      document.getElementById("progressBox").style.display = "none";
      document.getElementById("progressBar").style.width = "0%";

      closePopup();
      loadStalls();
    }
  };

  xhr.send(formData);
}


// 📦 LOAD
function loadStalls() {
  let container = document.getElementById("cards");
  container.innerHTML = "";

  db.collection("stalls").get().then(snapshot => {
    snapshot.forEach(doc => {
      let s = doc.data();

      container.innerHTML += `
        <div class="card">
          <img src="${s.image}">
          <h3>${s.name}</h3>
          <p>📍 ${s.location}</p>
          <p>⭐ ${s.rating}</p>
        </div>
      `;
    });
  });
}


// 🔍 SEARCH
function searchStalls() {
  let loc = document.getElementById("searchLocation").value.toLowerCase();
  let food = document.getElementById("searchFood").value.toLowerCase();

  let container = document.getElementById("cards");
  container.innerHTML = "";

  db.collection("stalls").get().then(snapshot => {
    snapshot.forEach(doc => {
      let s = doc.data();

      if (
        s.location.toLowerCase().includes(loc) &&
        s.name.toLowerCase().includes(food)
      ) {
        container.innerHTML += `
          <div class="card">
            <img src="${s.image}">
            <h3>${s.name}</h3>
            <p>📍 ${s.location}</p>
            <p>⭐ ${s.rating}</p>
          </div>
        `;
      }
    });
  });
}


// 🔔 TOAST
function showToast(msg) {
  let toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.style.display = "block";

  setTimeout(() => {
    toast.style.display = "none";
  }, 2000);
}


// START
loadStalls();

</script>
<script src="script.js"></script>

</body>
</html>
