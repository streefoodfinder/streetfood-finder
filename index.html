<!DOCTYPE html>
<html>
<head>
  <title>StreetFood Finder</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- MENU -->
<div class="menu-btn" onclick="toggleSidebar()">☰</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <h2>🍜 SFF</h2>
  <button onclick="openPopup()">➕ Add Stall</button>
  <button onclick="deleteAllStalls()">Delete All</button>
  <button>Explore</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SEARCH -->
  <div class="top-bar">
    <input id="searchLocation" placeholder="📍 Location">
    <input id="searchFood" placeholder="🍔 Food">
    <button onclick="searchStalls()">Search</button>
  </div>

  <!-- CARDS -->
  <div id="cards" class="cards"></div>

</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">

    <h2>Add Stall</h2>

    <input id="stallName" placeholder="Food Name">
    <input id="stallLocation" placeholder="Location">

    <!-- ⭐ STARS -->
    <div class="stars">
      <span onclick="setRating(1)">⭐</span>
      <span onclick="setRating(2)">⭐</span>
      <span onclick="setRating(3)">⭐</span>
      <span onclick="setRating(4)">⭐</span>
      <span onclick="setRating(5)">⭐</span>
    </div>

    <input id="stallComment" placeholder="Comment">
    <input type="file" id="stallImage">

    <button onclick="addStall()">Submit</button>
    <button onclick="closePopup()">Close</button>

  </div>
</div>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
