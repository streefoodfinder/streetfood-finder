<!DOCTYPE html>
<html>
<head>
  <title>StreetFood Finder</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>🍜 StreetFood</h2>

    <button onclick="openPopup()">+ Add Stall</button>
    <button>Explore</button>
    <button>Customize</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- SEARCH -->
    <div class="top-bar">
      <input id="searchLocation" placeholder="Enter location">
      <input id="searchFood" placeholder="Search food">
      <button onclick="searchStalls()">Search</button>
    </div>

    <!-- CARDS -->
    <div class="cards" id="cards"></div>

  </div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">
    <h2>Add Stall</h2>

    <input id="stallName" placeholder="Stall Name">
    <input id="stallLocation" placeholder="Location">
    <input id="stallRating" placeholder="Rating (1-5)">
    <input type="file" id="stallImage">

    <button onclick="addStall()">Submit</button>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBuT_SZS4Fhc42QDNBBdwFnabzxPJOPWrA",
  authDomain: "streetfood-finder.firebaseapp.com",
  projectId: "streetfood-finder",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function openPopup() {
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

// 🔥 CLOUDINARY UPLOAD
function addStall() {
  let name = document.getElementById("stallName").value;
  let location = document.getElementById("stallLocation").value;
  let rating = document.getElementById("stallRating").value;
  let file = document.getElementById("stallImage").files[0];

  if (!name || !location || !rating || !file) {
    alert("Fill all fields!");
    return;
  }

  let formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "new_rd");

  fetch("https://api.cloudinary.com/v1_1/dlptddjli/image/upload", {
    method: "POST",
    body: formData
  })
  .then(res => res.json())
  .then(data => {

    db.collection("stalls").add({
      name,
      location,
      rating,
      image: data.secure_url
    });

    closePopup();
    loadStalls();
  });
}

// LOAD
function loadStalls() {
  let container = document.getElementById("cards");
  container.innerHTML = "";

  db.collection("stalls").get().then(snapshot => {
    snapshot.forEach(doc => {
      let s = doc.data();

      container.innerHTML += `
        <div class="card">
          <img src="${s.image}">
          <h3>${s.name}</h3>
          <p>📍 ${s.location}</p>
          <p>⭐ ${s.rating}</p>
        </div>
      `;
    });
  });
}

// SEARCH
function searchStalls() {
  let loc = document.getElementById("searchLocation").value.toLowerCase();
  let food = document.getElementById("searchFood").value.toLowerCase();

  let container = document.getElementById("cards");
  container.innerHTML = "";

  db.collection("stalls").get().then(snapshot => {
    snapshot.forEach(doc => {
      let s = doc.data();

      if (
        s.location.toLowerCase().includes(loc) &&
        s.name.toLowerCase().includes(food)
      ) {
        container.innerHTML += `
          <div class="card">
            <img src="${s.image}">
            <h3>${s.name}</h3>
            <p>📍 ${s.location}</p>
            <p>⭐ ${s.rating}</p>
          </div>
        `;
      }
    });
  });
}

loadStalls();

</script>

</body>
</html>
